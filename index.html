<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Deseos - Olivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-disabled {
            filter: grayscale(0.4);
            opacity: 0.65;
            pointer-events: none;
        }
        .admin-controls { pointer-events: auto !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-white shadow-sm py-6 mb-10">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight text-gray-900">Lista de Deseos de Olivia</h1>
            <button id="adminBtn" onclick="toggleAdminMode()" class="px-5 py-2 text-sm font-medium bg-gray-200 rounded-full hover:bg-gray-300 transition-all">
                Modo Admin: OFF
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mb-16">
        <div id="loading" class="text-center text-gray-500 text-lg font-medium">Cargando elementos...</div>
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 hidden">
            </div>
    </main>

    <script>
        // URL de tu nueva implementación vinculada directamente
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIXj_HKVA3vPdx0HZFLfXWzGFGtSoft5f8DDBdCC9rN1WP5H-XsIDjW9_Sjexuck-B/exec"; 
        
        let itemsData = [];
        let isAdmin = false;

        function toggleAdminMode() {
            isAdmin = !isAdmin;
            document.getElementById('adminBtn').innerText = `Modo Admin: ${isAdmin ? 'ON' : 'OFF'}`;
            document.getElementById('adminBtn').classList.toggle('bg-green-200', isAdmin);
            renderCards();
        }

        async function fetchData() {
            try {
                const response = await fetch(`${WEB_APP_URL}?action=read`);
                itemsData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('cardsContainer').classList.remove('hidden');
                renderCards();
            } catch (error) {
                console.error("Error al cargar los datos:", error);
                document.getElementById('loading').innerText = "Error al conectar con la lista de Google Sheets.";
            }
        }
