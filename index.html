<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Olivia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-disabled {
            filter: grayscale(0.4);
            opacity: 0.65;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-white shadow-sm py-10 mb-10">
        <div class="max-w-6xl mx-auto px-6">
            <h1 class="text-5xl font-black tracking-tight text-[#60805c] mb-6 text-center sm:text-left">
                Wishlist Olivia
            </h1>
            
            <div class="bg-amber-50 border border-amber-200 rounded-2xl p-4 flex items-start gap-3 max-w-3xl mx-auto sm:mx-0">
                <svg class="w-6 h-6 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
                <div>
                    <h4 class="text-amber-800 font-bold text-sm mb-0.5">Aviso importante para invitados</h4>
                    <p class="text-amber-700 text-sm leading-relaxed font-medium">
                        Por favor, antes de concretar la compra externa de cualquier producto, asegurate de que nadie más lo haya reservado en esta página revisando que el botón no figure como <span class="font-bold">"Comprado"</span>.
                    </p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mb-16">
        <div id="loading" class="text-center text-gray-500 text-lg font-medium">Cargando elementos...</div>
        <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8 hidden">
            </div>
    </main>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyIXj_HKVA3vPdx0HZFLfXWzGFGtSoft5f8DDBdCC9rN1WP5H-XsIDjW9_Sjexuck-B/exec"; 
        
        let itemsData = [];

        async function fetchData() {
            try {
                const response = await fetch(WEB_APP_URL);
                itemsData = await response.json();
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('cardsContainer').classList.remove('hidden');
                renderCards();
            } catch (error) {
                console.error("Error al cargar los datos:", error);
                document.getElementById('loading').innerText = "Error al conectar con la lista de Google Sheets. Recordá verificar que la planilla esté compartida como pública (Cualquiera con el enlace).";
            }
        }

        function formatPrice(priceVal) {
            if (!priceVal) return '';
            
            let strVal = priceVal.toString().trim();
            let cleanVal = strVal.replace(/[\$\s]/g, '').replace(/\./g, '');
            cleanVal = cleanVal.replace(',', '.');
            
            const number = parseFloat(cleanVal);
            
            if (!isNaN(number)) {
                return '$ ' + number.toLocaleString('es-AR', {
                    minimumFractionDigits: strVal.includes(',') ? 2 : 0,
                    maximumFractionDigits: 2
                });
            }
            
            if (!strVal.startsWith('$')) {
                return '$ ' + strVal;
            }
            return strVal;
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = '';

            const sortedItems = [...itemsData].sort((a, b) => {
                const aComprado = a.comprado === true || a.comprado === "TRUE";
                const bComprado = b.comprado === true || b.comprado === "TRUE";
                return aComprado - bComprado;
            });

            sortedItems.forEach(item => {
                if (!item.titulo || item.titulo.toString().trim() === "") return;

                const isComprado = item.comprado === true || item.comprado === "TRUE";
                const esPrimeraNecesidad = item.primera_necesidad === "SI" || item.primera_necesidad === "si" || item.primera_necesidad === true || item.primera_necesidad === "TRUE";
                
                const card = document.createElement('div');
                card.className = `bg-white border border-gray-100 rounded-[28px] shadow-sm p-6 flex flex-col justify-between transition-all duration-300 ${isComprado ? 'card-disabled shadow-none' : 'hover:shadow-md'}`;

                card.innerHTML = `
                    <div class="cursor-pointer flex flex-col" onclick="${isComprado ? '' : `window.open('${item.link}', '_blank')`}">
                        
                        <div class="mb-4">
                            ${esPrimeraNecesidad ? `
                                <div class="inline-flex items-center gap-1.5 bg-[#e9f0e8] text-[#557351] px-3 py-1 rounded-full text-sm font-medium mb-2.5">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                                    primera necesidad
                                </div>
                                <br>
                            ` : ''}
                            
                            <h3 class="text-[26px] font-bold text-gray-900 leading-tight tracking-tight mb-1">${item.titulo}</h3>
                            ${item.variante ? `<p class="text-gray-500 text-lg font-normal mb-3">${item.variante}</p>` : ''}
                        </div>

                        <div class="w-full h-64 bg-gray-50 rounded-2xl overflow-hidden mb-6 flex items-center justify-center">
                            <img src="${item.imagen_url || 'https://via.placeholder.com/300x250'}" alt="${item.titulo}" class="w-full h-full object-cover">
                        </div>

                        ${item.precio ? `<div class="text-2xl font-bold text-gray-900 tracking-tight mb-4">${formatPrice(item.precio)}</div>` : ''}
                    </div>
                    
                    <div class="mt-auto">
                        ${isComprado ? `
                            <div class="bg-gray-50 border border-gray-200 p-4 rounded-2xl text-center">
                                <p class="text-sm text-gray-500 font-medium">Comprado por: <span class="text-gray-900 font-bold text-base">${item.comprador || 'Anónimo'}</span></p>
                            </div>
                        ` : `
                            <button onclick="markAsBought(${item.id})" class="w-full py-3.5 bg-[#60805c] hover:bg-[#4f6b4c] text-white font-medium text-base rounded-2xl transition-colors flex items-center justify-center gap-2 shadow-sm shadow-[#60805c]/20">
                                <svg class="w-5 h-5 stroke-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                Marcar como comprado
                            </button>
                        `}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function markAsBought(id) {
            const name = prompt("Por favor, ingresa tu nombre para reservarlo:");
            if (!name || name.trim() === "") return;

            const item = itemsData.find(i => i.id == id);
            if (item) {
                item.comprado = true;
                item.comprador = name;
                renderCards();
            }

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'update', id: id, comprado: true, comprador: name })
                });
            } catch (err) {
                console.error("Error al guardar en Sheets:", err);
            }
            
            setTimeout(fetchData, 2000); 
        }

        fetchData();
    </script>
</body>
</html>
